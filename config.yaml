# QWEN-SDXL Adapter: Phase 2 - Test Config

model:
  sdxl_model_id: "stabilityai/stable-diffusion-xl-base-1.0"
  qwen_model_id: "Qwen/Qwen3.5-0.8B-Base"
  sdxl_vae_id: "madebyollin/sdxl-vae-fp16-fix"

data:
  cache_dir: "/content/drive/MyDrive/Qwen_SDXL_Trainer/data/arb_cache"
  batch_size: 4
  num_workers: 4
  caption_dropout_prob: 0.10

training:
  output_dir: "/content/drive/MyDrive/Qwen_SDXL_Trainer/checkpoints/phase2_diff2flow"
  max_train_steps: 1000
  learning_rate: 5.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  gradient_accumulation_steps: 2
  mixed_precision: "bf16"
  gradient_checkpointing: true
  validation_steps: 500
  checkpointing_steps: 500
  validation_prompts:
    - ""
    - ""

logging:
  use_wandb: true
  wandb_project: "qwen-sdxl-adapter-phase2-test"
  wandb_run_name: "diff2flow_test_run"
  log_interval: 10
  track_grad_norms: true
